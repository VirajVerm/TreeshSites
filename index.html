<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreeshSites — Web Agency</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #020617;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 3rem;
}

.hero span {
  color: #22c55e;
}

.btn {
  background: #22c55e;
  color: black;
  padding: 12px 24px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  border-radius: 6px;
}

.services {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

.contact {
  padding: 60px 20px;
  text-align: center;
}

input, textarea {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #22c55e;
  border: none;
  padding: 12px 24px;
  cursor: pointer;
  border-radius: 6px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #020617;
}
</style>
</head>

<body>

<nav>
  <h2>TreeshSites</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Websites that <span>grow</span> your business</h1>
  <p>We build modern, fast, and high-converting websites.</p>
  <a href="#contact" class="btn">Start Project</a>
</section>

<section id="services" class="services">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card">Website Design</div>
    <div class="card">E-Commerce</div>
    <div class="card">Landing Pages</div>
    <div class="card">SEO Optimization</div>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Contact Us</h2>

  <input placeholder="Your Name">
  <input placeholder="Email">
  <textarea placeholder="Your Message"></textarea><br>

  <button onclick="alert('Backend coming next')">Send Message</button>

  <br><br>
  <a href="https://wa.me/91XXXXXXXXXX" style="color:#22c55e;">Chat on WhatsApp</a>
</section>

<footer>
  © 2026 TreeshSites
</footer>

</body>
</html>
